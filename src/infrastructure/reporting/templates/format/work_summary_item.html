{% if work_summaries %}
<div class="topic-section" style="margin-top: 30px;">
    <div class="paper-holes">
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
    </div>
    <div class="section-title">
        <svg class="doodle" viewBox="0 0 24 24">
            <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-2 14l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
        </svg>
        工作总结 Work Summary
    </div>
    {% for ws in work_summaries %}
    <div class="topic-item avoid-break">
        <div class="check-box">
            <div class="check-tick"></div>
        </div>
        <div class="topic-content">
            <div style="display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px;">
                <span class="topic-title">{{ ws.name }}</span>
                {% if ws.status %}
                <span style="font-size: 0.8em; color: #999; font-family: var(--font-hand);">[{{ ws.status }}]</span>
                {% endif %}
            </div>
            <div class="topic-detail">{{ ws.summary }}</div>
            {% if ws.tasks %}
            <div style="margin-top: 8px; font-family: var(--font-hand); font-size: 1rem; color: var(--ink-secondary);">
                📌 关键任务：
                {% for task in ws.tasks %}
                <span style="display: inline-block; background: var(--color-yellow); padding: 2px 8px; border-radius: 8px; margin: 2px 4px; font-size: 0.9rem;">{{ task }}</span>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
